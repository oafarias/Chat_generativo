name: Deploy to DigitalOcean Droplet

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.KEY }}
          port: 22
          script: |
            # 1. Limpeza de diretórios antigos (Legacy)
            rm -rf ~/app-teste ~/app-flask
            mkdir -p ~/app
            cd ~/app

            # 2. Lógica de Git
            if [ ! -d ".git" ]; then
              echo "Clonando repositório..."
              git clone https://github.com/${{ github.repository }}.git .
            else
              echo "Atualizando código..."
              git pull origin main
            fi

            # 3. FAXINA: Mata containers órfãos que possam estar segurando a porta 80
            docker stop $(docker ps -q) 2>/dev/null || true
            docker rm $(docker ps -aq) 2>/dev/null || true

            # 4. Sobe a versão nova do Django
            docker compose down
            docker compose up -d --build

            # 5. AUTOMAÇÃO: Roda as migrations para criar as tabelas no banco
            echo "Rodando migrations..."
            docker compose exec -T web python manage.py migrate --noinput