name: Deploy to DigitalOcean Droplet

on:
    push:
        branches: [ main ]
    
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
          - name: Deploy via SSH
            uses: appleboy/ssh-action@master
            with:
                host: ${{ secrets.HOST }}
                username: ${{ secrets.USER }}
                key: ${{ secrets.KEY }}
                port: 22
                script: |
            cd ~/app-flask # Caminho onde o projeto está no droplet

            # Lógica de Git: Clona se não existir, senão atualiza
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi

            # Sobe os containers (Caddy + Flask)
            # O --build garante que o Dockerfile do Flask seja reconstruído se houver mudanças no código
            docker compose up -d --build