version: '3.8'

services:
  # Seu container de aplicação Flask
  web:
    build: .
    restart: always
    environment:
      - FLASK_ENV=production
    # Não expomos porta aqui para a internet, o Caddy cuidará disso internamente

  # O "Roteador" que gerencia SSL e redireciona o tráfego
  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config: