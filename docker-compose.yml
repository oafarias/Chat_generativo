services:
  web:
    build: .
    # O Caddy vai conversar com o web pela porta 8000 internamente.
    # Se sua aplicação roda na 8000, não precisamos expor portas aqui 
    # para o mundo externo, o Caddy cuidará disso.
    expose:
      - "8000"
    restart: always
    networks:
      - aaleff_network

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - aaleff_network
    depends_on:
      - web

networks:
  aaleff_network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config: