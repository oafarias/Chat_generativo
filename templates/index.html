{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIWA | Atendimento</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.2">
</head>
<body>
    <div class="chat-wrapper">
        <header class="chat-header">
            <img src="https://aiwa.com.br/arquivos/logo-aiwa.png" alt="Aiwa Logo" class="logo">
            <div class="header-status">CHAT</div>
            <div class="header-actions">
                <button class="icon-btn">🔊</button>
                <button class="icon-btn">➖</button>
                <button class="icon-btn close">✕</button>
            </div>
        </header>

        <main class="chat-messages" id="chat-box">
            <div class="message bot">
                <img src="https://www.gravatar.com/avatar/000?d=mp" class="avatar">
                <div class="bubble">
                    O seu protocolo para este atendimento é: <span id="protocolo"></span>.<br>
                    Para que possamos seguir com o atendimento precisamos de alguns dados pessoais. O Sr(a). Está de acordo?
                </div>
                <span class="time">16:45</span>
            </div>
        </main>

        <footer class="chat-input-area">
            <div class="input-container">
                <button class="emoji-btn">😊</button>
                <input type="text" id="user-input" placeholder="Digite uma mensagem..." autocomplete="off">
                <button id="send-btn" class="send-btn">➔</button>
            </div>
        </footer>
    </div>

    <script src="{% static 'js/main.js' %}?v=1.2"></script>
</body>
</html>
